<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="/Media/pokeball.PNG" />
  </head>
  <body>
    <section>
      <div class="logo">
        <img class="pokelogo" src="Media/pokemon_logo.png" alt="pokemon logo" />
        <img class="pokeball" src="Media/pokeball.PNG" alt="pokeball" />
      </div>
    </section>

    <section>
      <div class="big-background">
        <div id="cards-container">
          <!-- Cards Structure
        <div id="card-#[specific number]" class="poke-card">

          <div class="front-card">
            <div class="img-container">
              <img src="" alt=""/>
            </div>
            <p class="number"></p>
            <p class="poke-name"></p>
            <div class="tipe-conatainer">
              <p class="[fire, normal, poison, ...]" class="type-style"></p>
            </div>
          </div>

          <div class="back-card">
            <div class="description-box">
              <p class="back-name"></p>
              <p class="description"><p>
            </div>
            <div class="features-box">
              <p class="features[height]"></p>
              <p class="features[weight]"></p>
              <p class="features[ability]"></p>
              <p class="features[habitat]"></p>
            </div>
          </div>

        </div>
        --></div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
