<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="/Media/pokeball.PNG" />
  </head>
  <body>
    <section>
      <div>
        <img src="Media/pokemon_logo.png" alt="pokemon logo" />
        <img src="Media/pokeball.PNG" alt="pokeball" />
      </div>
    </section>

    <section>
      <div id="cards-container">
        <div id="" class="poke-card">
          <img src="" alt="" />
          <p class="number">Nro.</p>
          <p class="poke-name">Name</p>
          <div class="type-container">
            <p class="poke-type"></p>
          </div>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
